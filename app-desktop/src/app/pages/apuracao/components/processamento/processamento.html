<div class="proc-page">
  <div class="proc-card">
    <!-- Header -->
    <div class="proc-card__header">
      <h1 class="proc-card__title">Processando Apuração</h1>
      <p class="proc-card__subtitle">Aguarde enquanto o motor fiscal processa os dados.</p>
    </div>

    <!-- Erro -->
    <div class="error-state" *ngIf="erro">
      <div class="error-state__icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#b53030" stroke-width="1.5" />
          <path d="M15 9l-6 6M9 9l6 6" stroke="#b53030" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
      <p class="error-state__msg">{{ erro }}</p>
      <button class="btn btn--ghost" (click)="voltarInicio()">Voltar</button>
    </div>

    <!-- Processando / Concluído -->
    <ng-container *ngIf="!erro">
      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-bar">
          <div
            class="progress-bar__fill"
            [class.progress-bar__fill--done]="concluido"
            [style.width.%]="status?.progresso ?? 0"
          ></div>
        </div>
        <span class="progress-pct">{{ status?.progresso ?? 0 }}%</span>
      </div>

      <!-- Etapas -->
      <div class="etapas">
        <div
          class="etapa"
          *ngFor="let e of etapas"
          [class.etapa--ativa]="etapaAtiva(e.key)"
          [class.etapa--concluida]="etapaConcluida(e.key)"
        >
          <div class="etapa__indicator">
            <!-- Concluída -->
            <svg
              *ngIf="etapaConcluida(e.key)"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
            >
              <path
                d="M20 6L9 17l-5-5"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              />
            </svg>
            <!-- Ativa (spinner) -->
            <span *ngIf="etapaAtiva(e.key) && !etapaConcluida(e.key)" class="spin-ring"></span>
            <!-- Pendente -->
            <span *ngIf="!etapaAtiva(e.key) && !etapaConcluida(e.key)" class="etapa__dot"></span>
          </div>
          <span class="etapa__label">{{ e.label }}</span>
        </div>
      </div>

      <!-- Mensagem atual -->
      <div class="status-msg" *ngIf="status && !concluido">
        {{ status.mensagem }}
      </div>

      <!-- Concluído -->
      <div class="done-state" *ngIf="concluido">
        <div class="done-state__icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path
              d="M20 6L9 17l-5-5"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <span class="done-state__label">Apuração concluída! Redirecionando...</span>
      </div>
    </ng-container>
  </div>
</div>
