<div class="kpi-card" [ngClass]="'kpi-card--' + data.type">
  <div class="kpi-card__content">
    <span class="kpi-card__title">{{ data.title }}</span>
    <span class="kpi-card__value">{{ data.value }}</span>
  </div>
  <div class="kpi-card__icon">
    <i class="material-symbols-outlined">{{ data.icon }}</i>
  </div>
</div>
