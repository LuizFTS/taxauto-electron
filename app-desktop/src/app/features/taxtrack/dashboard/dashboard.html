<div class="dashboard-container">
  <div class="dashboard-kpis-area">

      <app-kpi-card [data]="kpi"></app-kpi-card>
    }
  </div>

  <app-filters [form]="filtersForm"></app-filters>

  <div class="dashboard-board-area">
    <app-kanban [items]="mockKanbanItems"></app-kanban>
  </div>
</div>
