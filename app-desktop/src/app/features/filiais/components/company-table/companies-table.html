<table>
  <thead>
    <tr>
      <th class="col-numero">Nº Empresa</th>
      <th class="col-nome">Nome da Empresa</th>
      <th class="col-status">Status</th>
      <th class="col-actions">Ações</th>
    </tr>
  </thead>

  <tbody>
    <!-- ── Create Row ── -->
    @if (isCreating) {
      <tr class="editing-row">
        <td>
          <input
            type="text"
            class="inline-input"
            placeholder="Número"
            [value]="newRowData.numero"
            (input)="updateCreateFieldHandle('numero', $event)"
          />
        </td>
        <td>
          <input
            type="text"
            class="inline-input"
            placeholder="Nome"
            [value]="newRowData.nome"
            (input)="updateCreateFieldHandle('nome', $event)"
          />
        </td>
        <td>
          <select
            class="inline-select"
            [value]="newRowData.status"
            (change)="updateCreateFieldHandle('status', $event)"
          >
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </td>
        <td class="col-actions">
          <div class="action-group">
            <button class="action-btn save" (click)="saveCreateHandle()" title="Salvar">
              <mat-icon>check</mat-icon>
            </button>
            <button class="action-btn cancel" (click)="cancelCreateHandle()" title="Cancelar">
              <mat-icon>close</mat-icon>
            </button>
          </div>
        </td>
      </tr>
    }

    <!-- ── Empresas Rows ── -->
    @for (item of empresas; track item.id) {
      <tr [class.is-editing]="editingRows[item.id]">
        <!-- View mode -->
        @if (!editingRows[item.id]) {
          <td class="col-numero">
            <span class="number-chip">{{ item.numero }}</span>
          </td>
          <td class="col-nome">{{ item.nome }}</td>
          <td class="col-status">
            <span
              class="status-badge"
              [class.ativo]="item.status === 'Ativo'"
              [class.inativo]="item.status === 'Inativo'"
            >
              {{ item.status }}
            </span>
          </td>
          <td class="col-actions">
            <div class="action-group">
              <button class="action-btn" (click)="startEditHandle(item)" title="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button class="action-btn delete" (click)="deleteRowHandle(item.id)" title="Excluir">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        }
        <!-- Edit mode -->
        @if (editingRows[item.id]) {
          <td>
            <input
              type="text"
              class="inline-input"
              [value]="editingRows[item.id].numero"
              (input)="updateEditFieldHandle(item.id, 'numero', $event)"
            />
          </td>
          <td>
            <input
              type="text"
              class="inline-input"
              [value]="editingRows[item.id].nome"
              (input)="updateEditFieldHandle(item.id, 'nome', $event)"
            />
          </td>
          <td>
            <select
              class="inline-select"
              [value]="editingRows[item.id].status"
              (change)="updateEditFieldHandle(item.id, 'status', $event)"
            >
              <option value="Ativo">Ativo</option>
              <option value="Inativo">Inativo</option>
            </select>
          </td>
          <td class="col-actions">
            <div class="action-group">
              <button class="action-btn save" (click)="saveEditHandle(item.id)" title="Salvar">
                <mat-icon>check</mat-icon>
              </button>
              <button
                class="action-btn cancel"
                (click)="cancelEditHandle(item.id)"
                title="Cancelar"
              >
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </td>
        }
      </tr>
    } @empty {
      <tr class="empty-row">
        <td colspan="4">
          <div class="empty-state">
            <mat-icon>business</mat-icon>
            <span>Nenhuma empresa encontrada</span>
          </div>
        </td>
      </tr>
    }
  </tbody>
</table>
