<div class="page-container">
  <div class="surface-card">
    <!-- ── Header ── -->
    <div class="card-header">
      <div class="tabs">
        <button
          class="tab-btn"
          [class.active]="activeTab === 'Filiais'"
          (click)="setActiveTab('Filiais')"
        >
          Filiais
        </button>
        <button
          class="tab-btn"
          [class.active]="activeTab === 'Empresas'"
          (click)="setActiveTab('Empresas')"
        >
          Empresas
        </button>

        <!-- <button
          class="tab-btn"
          [class.active]="activeTab === 'Grupos'"
          (click)="setActiveTab('Grupos')"
        >
          Grupos
        </button> -->
      </div>

      <div class="header-actions">
        <div class="search-box">
          <mat-icon>search</mat-icon>
          <input
            type="text"
            [(ngModel)]="searchQuery"
            [placeholder]="'Buscar ' + (activeTab === 'Empresas' ? 'empresa' : 'filial') + '...'"
            (ngModelChange)="onSearchChange($event)"
          />
        </div>

        <app-button variant="solid" (click)="startCreate()">
          <span class="btn-content">
            <mat-icon>add</mat-icon>
            Adicionar {{ activeTab === 'Empresas' ? 'Empresa' : 'Filial' }}
          </span>
        </app-button>
      </div>
    </div>

    <!-- ── Table ── -->
    <div class="table-container">
      @if (activeTab === 'Empresas') {
        <app-companies-table
          [empresas]="empresasFiltered$ | async"
          [editingRows]="editingRows"
          [isCreating]="isCreating"
          [newRowData]="newEmpresaData"
          (saveEdit)="saveEdit($event)"
          (startEdit)="startEdit($event)"
          (deleteRow)="deleteRow($event)"
          (updateEditField)="updateEditField($event.id, $event.field, $event.event)"
          (startCreate)="startCreate()"
          (cancelCreate)="cancelCreate()"
          (saveCreate)="saveCreate()"
          (updateCreateField)="updateCreateField($event.field, $event.event)"
          (cancelEdit)="cancelEdit($event)"
        ></app-companies-table>
      }

      @if (activeTab === 'Filiais') {
        <app-branch-table
          [empresas]="empresasFiltered$ | async"
          [filiais]="filiaisFiltered$ | async"
          [editingRows]="editingRows"
          [isCreating]="isCreating"
          [newRowData]="newFilialData"
          (saveEdit)="saveEdit($event)"
          (startEdit)="startEdit($event)"
          (deleteRow)="deleteRow($event)"
          (updateEditField)="updateEditField($event.id, $event.field, $event.event)"
          (startCreate)="startCreate()"
          (cancelCreate)="cancelCreate()"
          (saveCreate)="saveCreate()"
          (updateCreateField)="updateCreateField($event.field, $event.event)"
          (cancelEdit)="cancelEdit($event)"
        ></app-branch-table>
      }

      @if (activeTab === 'Grupos') {
        <app-branch-groups-table></app-branch-groups-table>
      }
    </div>

    <!-- ── Footer ── -->
    <div class="card-footer">
      <span class="summary-text" *ngIf="activeTab === 'Empresas'">
        {{ (empresasFiltered$ | async)?.length ?? 0 }} resultado(s)
      </span>
      <span class="summary-text" *ngIf="activeTab === 'Filiais'">
        {{ (filiaisFiltered$ | async)?.length ?? 0 }} resultado(s)
      </span>

      <div class="pagination">
        <button class="page-btn" disabled>
          <mat-icon>chevron_left</mat-icon>
        </button>
        <button class="page-btn">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
