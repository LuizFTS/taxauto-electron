<div class="modal-backdrop" (click)="fechar()"></div>

<div class="modal">
  <div class="modal__header">
    <h2 class="modal__title">Criar Período Fiscal</h2>
    <button class="modal__close" (click)="fechar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path
          d="M18 6L6 18M6 6l12 12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>

  <div class="modal__body">
    <div class="period-preview">
      <span class="period-preview__value">{{ mesLabel }} / {{ ano }}</span>
    </div>

    <div class="info-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="info-box__icon">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" />
        <path
          d="M12 8v4M12 16h.01"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
      <div>
        <p class="info-box__title">Diretórios que serão criados:</p>
        <code class="info-box__path">{{ workspacePath }}\input\</code>
        <p class="info-box__desc">
          10 subpastas para cada tipo de arquivo fiscal serão geradas automaticamente.
        </p>
      </div>
    </div>

    <div class="error-box" *ngIf="erro">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" />
        <path
          d="M12 8v4M12 16h.01"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
      {{ erro }}
    </div>
  </div>

  <div class="modal__footer">
    <button class="btn btn--ghost" (click)="fechar()" [disabled]="criando">Cancelar</button>
    <button class="btn btn--primary" (click)="criar()" [disabled]="criando">
      <span *ngIf="!criando">Criar Período</span>
      <span *ngIf="criando" class="spinner"></span>
      <span *ngIf="criando">Criando...</span>
    </button>
  </div>
</div>
