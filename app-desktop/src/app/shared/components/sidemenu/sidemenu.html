<div class="sidemenu" [class.sidemenu--collapsed]="!isOpen">
  <div class="sidemenu__header">
    <button
      class="sidemenu__toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isOpen"
      aria-label="Toggle menu"
    >
      <span class="sidemenu__toggle-bar"></span>
      <span class="sidemenu__toggle-bar"></span>
      <span class="sidemenu__toggle-bar"></span>
    </button>
    <h1 class="sidemenu__title-text">TaxAuto</h1>
  </div>

  <div class="sidemenu__content">
    <nav class="sidemenu__nav">
      @for (section of menuItems; track section.title) {
        <div class="sidemenu__section">
          <p class="sidemenu__section-title">{{ section.title }}</p>
          <ul>
            @for (item of section.items; track item.title) {
              <li
                routerLink="{{ item.route }}"
                routerLinkActive="active"
                class="sidemenu__nav-item"
              >
                <a>
                  <mat-icon>{{ item.icon }}</mat-icon>
                  <span class="sidemenu__label">{{ item.title }}</span>
                </a>
              </li>
            }
          </ul>
        </div>

        @if (section !== menuItems[menuItems.length - 1]) {
          <div class="sidemenu__divider"></div>
        }
      }
