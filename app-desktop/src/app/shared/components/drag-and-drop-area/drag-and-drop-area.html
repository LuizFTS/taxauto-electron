<div class="drag-and-drop-container">
  <div
    class="drop-zone"
    [class.drag-over]="isDragOver"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="openFileSelector()"
    (keydown.enter)="openFileSelector()"
    (keydown.space)="openFileSelector()"
    tabindex="0"
    role="button"
  >
    <div class="drop-zone-content">
      <icon class="upload-icon">upload_file</icon>
      <h3 class="drop-title">Arraste os arquivos aqui ou clique para selecionar</h3>
      <p class="drop-subtitle">Arquivos suportados: .csv, .xlsx</p>
    </div>
  </div>

  @if (files.length > 0) {
    <div class="file-list">
      <div class="file-list-header">
        <h4 class="list-title">Arquivos selecionados ({{ files.length }})</h4>
        <p
          class="clean-files"
          (click)="cleanFiles()"
          (keydown.enter)="cleanFiles()"
          (keydown.space)="cleanFiles()"
          tabindex="0"
          role="button"
        >
          Remover todos
        </p>
      </div>
      <div class="file-items">
        @for (file of files; track file; let idx = $index) {
          <div
            class="file-item"
            draggable="true"
            (dragstart)="onItemDragStart(idx)"
            (dragover)="onItemDragOver($event, idx)"
            (dragleave)="onItemDragLeave()"
            (drop)="onItemDrop($event, idx)"
            (dragend)="onItemDragEnd()"
            [class.dragging]="draggedItemIndex === idx"
            [class.drag-over-item-top]="dragOverItemIndex === idx && idx <= (draggedItemIndex ?? 0)"
            [class.drag-over-item-bottom]="
              dragOverItemIndex === idx && idx > (draggedItemIndex ?? 0)
            "
          >
            <icon class="drag-handle" title="Arraste para reordenar">drag_indicator</icon>
            <icon class="file-icon">description</icon>
            <span class="file-name" [title]="file">{{ getFileName(file) }}</span>
            <button
              type="button"
              class="remove-btn"
              (click)="removeFile(idx)"
              aria-label="Remover arquivo"
            >
              <icon>close</icon>
            </button>
          </div>
        }
      </div>
    </div>
  }
</div>
