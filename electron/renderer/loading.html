<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaxAuto — Iniciando</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #1a2235;
        --navy2: #141b2b;
        --accent: #2d6be4;
        --accent2: #1a4db8;
        --text: #e8edf5;
        --muted: #8a9ab8;
        --line: rgba(255, 255, 255, 0.07);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--navy2);
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* subtle grid overlay */
      .shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        opacity: 0.5;
      }

      /* ── logo ───────────────────────────── */
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        animation: fadeUp 0.6s cubic-bezier(0.22, 0.9, 0.36, 1) both;
      }

      .logo-icon {
        width: 56px;
        height: 56px;
        background: var(--accent);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 32px rgba(45, 107, 228, 0.45);
        position: relative;
        overflow: hidden;
      }

      .logo-icon::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -75%;
        width: 50%;
        height: 200%;
        background: linear-gradient(
          105deg,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        transform: skewX(-15deg);
        animation: shine 3s ease-in-out infinite 1s;
      }

      .logo-icon svg {
        width: 30px;
        height: 30px;
        fill: #fff;
        z-index: 1;
      }

      .logo-name {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }

      .logo-name span {
        color: var(--accent);
      }

      /* ── infinite spinner bar ───────────── */
      .status-wrap {
        margin-top: 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        animation: fadeUp 0.6s cubic-bezier(0.22, 0.9, 0.36, 1) 0.15s both;
        width: 220px;
      }

      .bar-track {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 99px;
        overflow: hidden;
        position: relative;
      }

      /* infinite shimmer — two passes for smooth loop */
      .bar-track::before,
      .bar-track::after {
        content: "";
        position: absolute;
        top: 0;
        left: -60%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          #5b9aff,
          transparent
        );
        border-radius: 99px;
        box-shadow: 0 0 10px rgba(45, 107, 228, 0.8);
        animation: slide 1.6s ease-in-out infinite;
      }

      .bar-track::after {
        animation-delay: 0.8s;
      }

      .status-text {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      /* dots */
      .dots {
        display: flex;
        gap: 5px;
      }
      .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: blink 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      /* ── version ─────────────────────────── */
      .version {
        position: absolute;
        bottom: 16px;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        color: rgba(138, 154, 184, 0.35);
        letter-spacing: 0.08em;
      }

      /* ── keyframes ───────────────────────── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slide {
        0% {
          left: -60%;
        }
        100% {
          left: 110%;
        }
      }

      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.3);
        }
      }

      @keyframes shine {
        0% {
          left: -75%;
        }
        50%,
        100% {
          left: 125%;
        }
      }

      /* fade-out quando o backend estiver pronto */
      body.done {
        animation: fadeOut 0.5s ease forwards;
      }
      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h6v1.5H8V16zm0-6h3v1.5H8V10z"
            />
          </svg>
        </div>
        <div class="logo-name">Tax<span>Auto</span></div>
      </div>

      <div class="status-wrap">
        <div class="bar-track"></div>
        <div class="status-text">Iniciando...</div>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <div class="version">v1.0.0</div>
    </div>
