<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaxAuto — Iniciando</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #1a2235;
        --navy2: #141b2b;
        --accent: #2d6be4;
        --accent2: #1a4db8;
        --text: #e8edf5;
        --muted: #8a9ab8;
        --line: rgba(255, 255, 255, 0.07);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--navy2);
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      /* ── layout ─────────────────────────── */
      .shell {
        width: 100%;
        height: 100%;
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        position: relative;
      }

      /* subtle grid overlay */
      .shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        opacity: 0.5;
      }

      /* ── logo block ──────────────────────── */
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        animation: fadeUp 0.6s cubic-bezier(0.22, 0.9, 0.36, 1) both;
      }

      .logo-icon {
        width: 56px;
        height: 56px;
        background: var(--accent);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 32px rgba(45, 107, 228, 0.45);
        position: relative;
        overflow: hidden;
      }

      /* shine sweep */
      .logo-icon::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -75%;
        width: 50%;
        height: 200%;
        background: linear-gradient(
          105deg,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        transform: skewX(-15deg);
        animation: shine 3s ease-in-out infinite 1s;
      }

      .logo-icon svg {
        width: 30px;
        height: 30px;
        fill: #fff;
        z-index: 1;
      }

      .logo-name {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: var(--text);
      }

      .logo-name span {
        color: var(--accent);
      }

      /* ── status area ─────────────────────── */
      .status-wrap {
        margin-top: 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: fadeUp 0.6s cubic-bezier(0.22, 0.9, 0.36, 1) 0.15s both;
        width: 220px;
      }

      .status-text {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.04em;
        height: 16px;
        transition: opacity 0.3s;
      }

      /* progress bar */
      .bar-track {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 99px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--accent2),
          var(--accent),
          #5b9aff
        );
        border-radius: 99px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 8px rgba(45, 107, 228, 0.7);
      }

      /* dots */
      .dots {
        display: flex;
        gap: 5px;
        margin-top: 2px;
      }

      .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: blink 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      /* ── version ─────────────────────────── */
      .version {
        position: absolute;
        bottom: 16px;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        color: rgba(138, 154, 184, 0.4);
        letter-spacing: 0.08em;
      }

      /* ── keyframes ───────────────────────── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.3);
        }
      }

      @keyframes shine {
        0% {
          left: -75%;
        }
        50%,
        100% {
          left: 125%;
        }
      }

      /* fade-out on done */
      body.done {
        animation: fadeOut 0.5s ease forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="logo-wrap">
        <div class="logo-icon">
          <!-- simple "T" document icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h6v1.5H8V16zm0-6h3v1.5H8V10z"
            />
          </svg>
        </div>
        <div class="logo-name">Tax<span>Auto</span></div>
      </div>

      <div class="status-wrap">
        <div class="bar-track">
          <div class="bar-fill" id="bar"></div>
        </div>
        <div class="status-text" id="msg">Iniciando serviços...</div>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <div class="version">v1.0.0</div>
    </div>

    <script>
      const bar = document.getElementById("bar");
      const msg = document.getElementById("msg");

      const steps = [
        { pct: 20, label: "Carregando módulos..." },
        { pct: 45, label: "Conectando ao banco de dados..." },
        { pct: 68, label: "Inicializando serviços fiscais..." },
        { pct: 88, label: "Verificando configurações..." },
        { pct: 100, label: "Pronto!" },
      ];

      let i = 0;
      function next() {
        if (i >= steps.length) return;
        const s = steps[i++];
        bar.style.width = s.pct + "%";
        msg.textContent = s.label;
        if (i < steps.length) {
          setTimeout(next, 600 + Math.random() * 400);
        } else {
          // backend ready → notify Electron (or just fade out after delay)
          setTimeout(() => {
            document.body.classList.add("done");
            setTimeout(() => {
              // If running inside Electron, send IPC signal:
              // window.electronAPI?.backendReady();
              // For standalone demo, just reload:
              // location.reload();
            }, 500);
          }, 700);
        }
      }

      setTimeout(next, 400);
    </script>
  </body>
</html>
